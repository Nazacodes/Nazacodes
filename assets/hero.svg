<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1000 260" width="100%" role="img" aria-label="Naza — from bits and registers to full-stack systems" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;max-width:100%">
  <defs>
    <!-- Name gradient: purple -> royal blue -> teal, sweeping -->
    <linearGradient id="nameGrad" gradientUnits="userSpaceOnUse" x1="40" y1="60" x2="470" y2="180" spreadMethod="reflect">
      <stop offset="0" stop-color="#8A2BE2"/>
      <stop offset="0.5" stop-color="#4169E1"/>
      <stop offset="1" stop-color="#00CED1"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-220 0; 220 0; -220 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Border gradient, slowly rotating hue sweep -->
    <linearGradient id="borderGrad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1000" y2="260" spreadMethod="reflect">
      <stop offset="0" stop-color="#8A2BE2"/>
      <stop offset="0.5" stop-color="#00CED1"/>
      <stop offset="1" stop-color="#4169E1"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="0 0; 400 0; 0 0" dur="9s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Tagline gradient -->
    <linearGradient id="tagGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9db4ff"/>
      <stop offset="1" stop-color="#7fe9ec"/>
    </linearGradient>

    <!-- Soft moving colour washes -->
    <radialGradient id="washPurple" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8A2BE2" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8A2BE2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washTeal" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00CED1" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#00CED1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washBlue" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4169E1" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#4169E1" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>

    <!-- Drifting grid -->
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0 L0 0 0 42" fill="none" stroke="#3a3f66" stroke-width="1" stroke-opacity="0.35"/>
      <animateTransform attributeName="patternTransform" type="translate" values="0 0; 42 42; 0 0" dur="14s" repeatCount="indefinite"/>
    </pattern>

    <!-- Clip of the name for the shine sweep -->
    <clipPath id="nameClip">
      <text x="58" y="150" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="104" font-weight="800" letter-spacing="2">Naza</text>
    </clipPath>

    <!-- Diagonal shine -->
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="frame">
      <rect x="2" y="2" width="996" height="256" rx="20"/>
    </clipPath>

    <style>
      @keyframes nameIn { from { opacity:0; transform:translateY(16px);} to { opacity:1; transform:translateY(0);} }
      @keyframes fadeUp { from { opacity:0; transform:translateY(12px);} to { opacity:1; transform:translateY(0);} }
      @keyframes draw   { to { stroke-dashoffset:0; } }
      @keyframes twinkle{ 0%,100%{opacity:.12} 50%{opacity:.7} }
      @keyframes rise   { from{transform:translateY(0)} to{transform:translateY(-34px)} }
      @keyframes fall   { 0%{transform:translateY(-24px);opacity:0} 12%{opacity:.5} 88%{opacity:.5} 100%{transform:translateY(46px);opacity:0} }

      .name  { animation: nameIn 1.2s cubic-bezier(.2,.75,.2,1) both; transform-box:fill-box; }
      .tag   { animation: fadeUp 1s ease .95s both; }
      .kicker{ animation: fadeUp .9s ease .55s both; }
      .accent{ stroke-dasharray:360; stroke-dashoffset:360; animation: draw 1.5s ease .7s both; }
      .p     { animation: twinkle 3.4s ease-in-out infinite, rise 6s ease-in-out infinite alternate; transform-box:fill-box; }
      .bit   { animation: fall 7s linear infinite; }
    </style>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1000" height="260" rx="20" fill="#1a1b27"/>

  <g clip-path="url(#frame)">
    <!-- moving colour washes -->
    <g filter="url(#softBlur)">
      <ellipse cx="180" cy="70" rx="260" ry="180" fill="url(#washPurple)">
        <animateTransform attributeName="transform" type="translate" values="0 0; 120 40; -40 -20; 0 0" dur="16s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="640" cy="220" rx="300" ry="200" fill="url(#washBlue)">
        <animateTransform attributeName="transform" type="translate" values="0 0; -90 -30; 60 20; 0 0" dur="19s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="880" cy="60" rx="240" ry="170" fill="url(#washTeal)">
        <animateTransform attributeName="transform" type="translate" values="0 0; -60 40; 30 -30; 0 0" dur="21s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- grid -->
    <rect width="1000" height="260" fill="url(#grid)"/>

    <!-- faint binary streams (bits & registers) -->
    <g font-family="'SFMono-Regular',Consolas,monospace" font-size="13" fill="#00CED1" fill-opacity="0.22">
      <text class="bit" x="705" y="30" style="animation-delay:0s">01001110</text>
      <text class="bit" x="770" y="20" style="animation-delay:1.6s">10110100</text>
      <text class="bit" x="835" y="34" style="animation-delay:3.1s">01100001</text>
      <text class="bit" x="900" y="22" style="animation-delay:4.4s">11010010</text>
      <text class="bit" x="740" y="150" fill="#4169E1" style="animation-delay:2.2s">0100 1010</text>
      <text class="bit" x="865" y="150" fill="#8A2BE2" style="animation-delay:5s">1010 0111</text>
    </g>

    <!-- right-side orbit / system node -->
    <g transform="translate(858,132)">
      <g class="p" style="animation:none">
        <circle r="72" fill="none" stroke="#00CED1" stroke-opacity="0.30" stroke-width="1.4" stroke-dasharray="4 10">
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="24s" repeatCount="indefinite"/>
        </circle>
        <circle r="50" fill="none" stroke="#4169E1" stroke-opacity="0.38" stroke-width="1.4" stroke-dasharray="2 8">
          <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="16s" repeatCount="indefinite"/>
        </circle>
        <circle r="30" fill="none" stroke="#8A2BE2" stroke-opacity="0.45" stroke-width="1.4">
          <animate attributeName="r" values="28;33;28" dur="4s" repeatCount="indefinite"/>
        </circle>
      </g>
      <!-- orbiting dots -->
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="9s" repeatCount="indefinite"/>
        <circle cx="72" cy="0" r="4" fill="#00CED1" filter="url(#glow)"/>
      </g>
      <g>
        <animateTransform attributeName="transform" type="rotate" from="180" to="540" dur="12s" repeatCount="indefinite"/>
        <circle cx="50" cy="0" r="3.4" fill="#4169E1" filter="url(#glow)"/>
      </g>
      <!-- core -->
      <circle r="7" fill="#8A2BE2" filter="url(#glow)">
        <animate attributeName="fill" values="#8A2BE2;#4169E1;#00CED1;#8A2BE2" dur="6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- drifting particles -->
    <g fill="#7fe9ec">
      <circle class="p" cx="120" cy="210" r="2.6" style="animation-delay:0s"/>
      <circle class="p" cx="300" cy="60"  r="2"   fill="#9db4ff" style="animation-delay:1.1s"/>
      <circle class="p" cx="470" cy="205" r="3"   fill="#c39bff" style="animation-delay:2.3s"/>
      <circle class="p" cx="210" cy="120" r="1.8" style="animation-delay:.6s"/>
      <circle class="p" cx="560" cy="80"  r="2.2" fill="#9db4ff" style="animation-delay:3.2s"/>
      <circle class="p" cx="60"  cy="90"  r="2"   fill="#c39bff" style="animation-delay:1.8s"/>
    </g>

    <!-- kicker -->
    <text class="kicker" x="60" y="66" font-family="'SFMono-Regular',Consolas,monospace" font-size="15" letter-spacing="5" fill="#7fe9ec" fill-opacity="0.9">&lt;/&gt; NAZACODES</text>

    <!-- NAME -->
    <g class="name">
      <text x="58" y="150" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="104" font-weight="800" letter-spacing="2" fill="url(#nameGrad)" filter="url(#glow)">Naza</text>
    </g>
    <!-- shine sweep over the name -->
    <g clip-path="url(#nameClip)">
      <rect x="-260" y="40" width="180" height="130" transform="skewX(-18)" fill="url(#shine)" opacity="0.65">
        <animate attributeName="x" values="-260;520" dur="4.5s" begin="1.4s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- accent underline -->
    <path class="accent" d="M60 172 H360" stroke="url(#nameGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>

    <!-- TAGLINE -->
    <text class="tag" x="61" y="205" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="24" font-weight="500" letter-spacing="0.4" fill="url(#tagGrad)">from bits and registers to full-stack systems</text>
  </g>

  <!-- animated border -->
  <rect x="2" y="2" width="996" height="256" rx="20" fill="none" stroke="url(#borderGrad)" stroke-width="2" stroke-opacity="0.85"/>
</svg>