name: Generate Metrics (Isometric Calendar)

# Renders the isometric 3D commit calendar SVG used inside the
# "More stats & insights" section of the profile README.
#
# REQUIRES a repo secret named METRICS_TOKEN:
#   a classic Personal Access Token with `repo`, `read:org`, `read:user` scopes.
#   Create at https://github.com/settings/tokens  → add under
#   repo Settings → Secrets and variables → Actions → New repository secret.
# Until that secret exists this workflow will fail and the isocalendar image
# in the README simply won't render (it is hidden inside a <details> block).

on:
  schedule:
    # Runs once a day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      - name: Generate isometric commit calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: metrics.plugin.isocalendar.svg
          base: ""
          config_timezone: Africa/Lagos
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
